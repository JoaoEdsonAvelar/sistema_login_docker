{% extends 'base.html' %}
{% block conteudo %}

<h2>Login</h2>

<!-- Bloco de Mensagens de Sucesso ou Erro -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for msg in messages %}
      {% if "sucesso" in msg %}
        <!-- Alerta Verde do Bootstrap para Cadastro -->
        <div class="alert alert-success" role="alert">
            {{ msg }}
        </div>
      {% else %}
        <!-- Alerta Vermelho do Bootstrap para Erro de Login -->
        <div class="alert alert-danger" role="alert">
            {{ msg }}
        </div>
      {% endif %}
    {% endfor %}
  {% endif %}
{% endwith %}

<form action="/login" method="post">
    <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" name="email" required>
    </div>

    <div class="mb-3">
        <label>Senha</label>
        <input type="password" class="form-control" name="senha" required>
    </div>

    <button class="btn btn-primary">Entrar</button>
    <a href="/cadastro" class="btn btn-success">Cadastrar</a>
</form>
{% endblock %}
